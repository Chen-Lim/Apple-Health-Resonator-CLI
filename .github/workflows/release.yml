name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to prepare, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: ahr
  BIN_ASSET_NAME: ahr-macos-arm64
  TARGET_TRIPLE: aarch64-apple-darwin

jobs:
  release:
    name: Build and Release
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          cargo_version="$(grep '^version = ' Cargo.toml | head -n 1 | cut -d '"' -f2)"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${{ inputs.release_tag }}"
          fi

          if [[ -z "${release_tag}" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z. Got: ${release_tag}" >&2
            exit 1
          fi

          tag_version="${release_tag#v}"
          if [[ "${cargo_version}" != "${tag_version}" ]]; then
            echo "Cargo.toml version ${cargo_version} does not match release tag ${release_tag}" >&2
            exit 1
          fi

          source_archive_name="${release_tag}.tar.gz"
          source_tarball_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${source_archive_name}"

          echo "cargo_version=${cargo_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "tag_version=${tag_version}" >> "${GITHUB_OUTPUT}"
          echo "source_archive_name=${source_archive_name}" >> "${GITHUB_OUTPUT}"
          echo "source_tarball_url=${source_tarball_url}" >> "${GITHUB_OUTPUT}"

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ env.TARGET_TRIPLE }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ env.TARGET_TRIPLE }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Apple Silicon binary
        run: cargo build --locked --release --target ${{ env.TARGET_TRIPLE }} --bin ${{ env.BIN_NAME }}

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          release_dir="${RUNNER_TEMP}/release-assets"
          mkdir -p "${release_dir}"

          binary_path="${release_dir}/${BIN_ASSET_NAME}"
          cp "target/${TARGET_TRIPLE}/release/${BIN_NAME}" "${binary_path}"
          chmod +x "${binary_path}"

          source_archive_path="${release_dir}/${{ steps.meta.outputs.source_archive_name }}"
          curl -L --fail "${{ steps.meta.outputs.source_tarball_url }}" -o "${source_archive_path}"

          source_sha="$(shasum -a 256 "${source_archive_path}" | awk '{print $1}')"
          binary_sha="$(shasum -a 256 "${binary_path}" | awk '{print $1}')"
          printf '%s  %s\n' "${source_sha}" "${{ steps.meta.outputs.source_archive_name }}" > "${release_dir}/SHA256SUMS"
          printf '%s  %s\n' "${binary_sha}" "${BIN_ASSET_NAME}" >> "${release_dir}/SHA256SUMS"

          echo "release_dir=${release_dir}" >> "${GITHUB_OUTPUT}"
          echo "binary_path=${binary_path}" >> "${GITHUB_OUTPUT}"
          echo "source_archive_path=${source_archive_path}" >> "${GITHUB_OUTPUT}"
          echo "source_sha=${source_sha}" >> "${GITHUB_OUTPUT}"
          echo "binary_sha=${binary_sha}" >> "${GITHUB_OUTPUT}"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ steps.meta.outputs.release_tag }}"
          release_title="ahr ${release_tag}"
          notes_file="${RUNNER_TEMP}/release-notes.md"

          cat > "${notes_file}" <<EOF
          ## ahr ${release_tag}

          ### Installation

          **Homebrew:**
          \`\`\`bash
          brew update && brew upgrade ahr
          \`\`\`

          **Direct download:** Download \`ahr-macos-arm64\` from the assets below, then:
          \`\`\`bash
          chmod +x ahr-macos-arm64
          mv ahr-macos-arm64 /usr/local/bin/ahr
          \`\`\`
          EOF

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release edit "${release_tag}" --title "${release_title}" --notes-file "${notes_file}"
          else
            gh release create "${release_tag}" --title "${release_title}" --notes-file "${notes_file}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh release upload "${{ steps.meta.outputs.release_tag }}" \
            "${{ steps.assets.outputs.binary_path }}#${BIN_ASSET_NAME}" \
            "${{ steps.assets.outputs.release_dir }}/SHA256SUMS#SHA256SUMS" \
            --clobber

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## Release Published"
            echo
            echo "- Release tag: \`${{ steps.meta.outputs.release_tag }}\`"
            echo "- Cargo.toml version: \`${{ steps.meta.outputs.cargo_version }}\`"
            echo "- Binary asset: \`${BIN_ASSET_NAME}\`"
            echo "- Binary sha256: \`${{ steps.assets.outputs.binary_sha }}\`"
            echo
            echo "Homebrew tap update dispatched automatically."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Dispatch Homebrew tap update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          gh api repos/Chen-Lim/homebrew-tap/dispatches \
            --input - <<<"{
              \"event_type\": \"ahr-release\",
              \"client_payload\": {
                \"version\": \"${{ steps.meta.outputs.tag_version }}\",
                \"binary_sha256\": \"${{ steps.assets.outputs.binary_sha }}\"
              }
            }"
